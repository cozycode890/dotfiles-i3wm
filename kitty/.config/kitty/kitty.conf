# ─────────────────────────────────────────────────────────────────────────────
# Kitty — Clean Tokyo Night setup
# ─────────────────────────────────────────────────────────────────────────────

# Colors (Tokyo Night)
foreground               #a9b1d6
background               #1a1b26

color0   #414868
color8   #414868
color1   #f7768e
color9   #f7768e
color2   #73daca
color10  #73daca
color3   #e0af68
color11  #e0af68
color4   #7aa2f7
color12  #7aa2f7
color5   #bb9af7
color13  #bb9af7
color6   #7dcfff
color14  #7dcfff
color7   #c0caf5
color15  #c0caf5

# Cursor & selection
cursor                    #c0caf5
cursor_text_color         #1a1b26
selection_foreground      none
selection_background      #28344a
url_color                 #9ece6a

# Window borders
active_border_color       #3d59a1
inactive_border_color     #101014
bell_border_color         #e0af68

# Font
font_family               FiraCode Nerd Font
bold_font                 FiraCode Nerd Font
italic_font               FiraCode Nerd Font
bold_italic_font          FiraCode Nerd Font
font_size                 18.0

# Cursor behavior
cursor_shape              beam
cursor_blink_interval     0.5
cursor_stop_blinking_after 0
cursor_trail             80
cursor_trail_decay       0.08 0.35
cursor_trail_start_threshold 0

# Performance / latency
input_delay               0
repaint_delay             2
sync_to_monitor           yes

# Scrollback
scrollback_lines          100000

# Padding & decorations
window_padding_width      0 5
dynamic_padding           no
hide_window_decorations   yes

# Terminal & window
term                      xterm-256color
remember_window_size      no
initial_window_width      82c
initial_window_height     18c
confirm_os_window_close   0

# Remote control / kitten IPC
allow_remote_control      yes

# Background opacity
background_opacity        0.8

# Mouse wheel
wheel_scroll_multiplier   1.2

# ── Tab bar ──────────────────────────────────────────────────────────────────
tab_bar_edge              bottom
tab_bar_align             center
tab_bar_min_tabs          1
tab_bar_style             powerline
tab_powerline_style       slanted

# Colors for tabs
tab_bar_background        #16161e
active_tab_background     #292e42
active_tab_foreground     #c0caf5
active_tab_font_style     bold
inactive_tab_background   #1a1b26
inactive_tab_foreground   #565f89
inactive_tab_font_style   normal

# Titles & indicators
tab_title_template        "{index} {title}{' · ' + str(num_windows) if num_windows > 1 else ''}"
active_tab_title_template "{index} {title}{' · ' + str(num_windows) if num_windows > 1 else ''}"
tab_title_max_length      40
tab_activity_symbol       "•"

# Optional (commented; uncomment if kitty version supports these)
# tab_bar_margin_height   2.0 0.0
# tab_bar_margin_width    6.0

# Chuyển TAB sang trái/phải
map ctrl+shift+left  previous_tab
map ctrl+shift+h     previous_tab
map ctrl+shift+right next_tab
map ctrl+shift+l     next_tab

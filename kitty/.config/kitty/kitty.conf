# ========== FONT ==========
# Alacritty: FiraCode Nerd Font Regular/Bold/Italic, size=14
font_family      FiraCode Nerd Font
bold_font        FiraCode Nerd Font
italic_font      FiraCode Nerd Font
bold_italic_font FiraCode Nerd Font
font_size        18.0

# --- Shape and Animation of Cursor 
shell_integration no-cursor
cursor_shape beam
cursor_blink_interval 0.5 ease-in-out
cursor_stop_blinking_after 0

# Hiệu ứng "đuôi" (trails) như smear
cursor_trail 80
cursor_trail_decay 0.08 0.35
cursor_trail_start_threshold 0
# cursor_trail_color # để trống dùng màu con trỏ; có thể đặt #a6e3a1, v.v.

# --- Độ mượt/độ trễ (tăng FPS, phản hồi nhanh)
input_delay 0
repaint_delay 2
sync_to_monitor yes

# Scrollback line amount
scrollback_lines 100000

#window_padding_width 8 18
window_padding_width 5

# set terminal
term xterm-256color

# window settings
remember_window_size    no
initial_window_width    82c
initial_window_height   18c

confirm_os_window_close 0

# IPC / remote control (tương đương ipc_socket=true để có điều khiển từ ngoài)
allow_remote_control yes

# Nền mờ (opacity = 0.9)
background_opacity 0.9
# background_opacity 1

# Mouse wheel multiplier (multiplier = 3)
wheel_scroll_multiplier 1.5

wheel_scroll_multiplier 1.2

# Tương đương decorations="None"
hide_window_decorations yes

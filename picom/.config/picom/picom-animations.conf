# Animations for NORMAL windows.
{
match = "window_type = 'normal' && !(class_g = 'flameshot' || class_g = 'mpv' || class_g = 'xwinwrap')";
  animations = (
    {
      triggers = ["close"];
      opacity = {
        curve = "cubic-bezier(0,1,1,1)";
        duration = 0.2;
        start = "window-raw-opacity-before";
        end = 0;
      };
      blur-opacity = "opacity";
      shadow-opacity = "opacity";

      scale-x = {
        curve = "cubic-bezier(0,1.3,1,1)";
        duration = 0.2;
        start = 1;
        end = 0.6;
      };
      scale-y = "scale-x";

      offset-x = "(1 - scale-x) / 2 * window-width";
      offset-y = "(1 - scale-y) / 2 * window-height";

      shadow-scale-x = "scale-x";
      shadow-scale-y = "scale-y";
      shadow-offset-x = "offset-x";
      shadow-offset-y = "offset-y";
    },

    {
      triggers = ["open"];
      opacity = {
        curve = "cubic-bezier(0,1,1,1)";
        duration = 0.5;
        start = 0;
        end = "window-raw-opacity";
      };
      blur-opacity = "opacity";
      shadow-opacity = "opacity";

      scale-x = {
        curve = "cubic-bezier(0,1.3,1,1)";
        duration = 0.5;
        start = 0.6;
        end = 1;
      };
      scale-y = "scale-x";

      offset-x = "(1 - scale-x) / 2 * window-width";
      offset-y = "(1 - scale-y) / 2 * window-height";

      shadow-scale-x = "scale-x";
      shadow-scale-y = "scale-y";
      shadow-offset-x = "offset-x";
      shadow-offset-y = "offset-y";
    },

    {
      triggers = ["geometry"];
      scale-x = {
        curve = "cubic-bezier(0,0,0,1.28)";
        duration = 0.5;
        start = "window-width-before / window-width";
        end = 1;
      };

      scale-x-reverse = {
        curve = "cubic-bezier(0,0,0,1.28)";
        duration = 0.3;
        start = "window-width / window-width-before";
        end = 1;
      };

      scale-y = {
        curve = "cubic-bezier(0,0,0,1.28)";
        duration = 0.5;
        start = "window-height-before / window-height";
        end = 1;
      };

      scale-y-reverse = {
        curve = "cubic-bezier(0,0,0,1.28)";
        duration = 0.3;
        start = "window-height / window-height-before";
        end = 1;
      };

      offset-x = {
        curve = "cubic-bezier(0,0,0,1.28)";
        duration = 0.5;
        start = "window-x-before - window-x";
        end = 0;
      };

      offset-y = {
        curve = "cubic-bezier(0,0,0,1.28)";
        duration = 0.5;
        start = "window-y-before - window-y";
        end = 0;
      };

      shadow-scale-x = "scale-x";
      shadow-scale-y = "scale-y";
      shadow-offset-x = "offset-x";
      shadow-offset-y = "offset-y";
    }
  );
},

{
  match = "class_g = 'dmenu' || class_g = 'i3bar' || class_g = 'Polybar'";
  animations = (
    {
      triggers = ["close", "hide"];
      preset = "fly-out";
      direction = "down";
      duration = 0.2;
    },
    {
      triggers = ["open", "show"];
      preset = "fly-in";
      direction = "down";
      duration = 0.2;
    }
  );
},

{
  match = "name = 'Notification' || class_g ~= 'Notify-osd' || class_g = 'Dunst'";
  animations = (
    {
      triggers = ["close", "hide"];
      preset = "slide-out";
      direction = "up";
      duration = 0.25;
    },
    {
      triggers = ["open", "show"];
      preset = "slide-in";
      direction = "up";
      duration = 0.25;
    }
  );
},

{
  match =
    "class_g = 'Code' && window_type = 'dropdown_menu' || "
    "class_g = 'Code' && window_type = 'popup_menu' || "
    "class_g = 'Code' && window_type = 'menu' || "
    "class_g = 'Viewnior' || "
    "window_type = 'dropdown_menu' || "
    "window_type = 'popup_menu' || "
    "window_type = 'tooltip' || "
    "window_type = 'menu'";
  animations = (
    {
      triggers = ["close", "hide"];
      preset = "disappear";
      duration = 0.05;
      scale = 0.5;
    },
    {
      triggers = ["open", "show"];
      preset = "appear";
      duration = 0.05;
      scale = 0.5;
    }
  );
},

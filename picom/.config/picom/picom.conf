#################################
#             Shadows           #
#################################

shadow = false;
shadow-radius = 16;
shadow-opacity = 0.5;
no-dock-shadow = true;

#################################
#           Fading              #
#################################

fading = true;
fade-in-step  = 0.05;
fade-out-step = 0.05;

#################################
#           Corners             #
#################################

round-borders = 1;
corner-radius = 0;

#################################
#     Background Blur           #
#################################

blur: {
  method           = "dual_kawase";
  # strength         = 10;
  strength         = 4;
  background       = true;
  background-frame = true;
  background-fixed = false;
}

#################################
#       General Settings        #
#################################

backend             = "glx";
dithered-present    = false;
vsync               = true;
dbe                 = false;
unredir-if-possible = false;

detect-rounded-corners = true;
detect-client-opacity  = true;
use-ewmh-active-win    = true;
detect-transient       = true;
detect-client-leader   = true;

use-damage          = true;
xrender-sync-fence  = true;

log-level = "warn";

#################################
#       GLX backend opts        #
#################################

glx-copy-from-front = false;

###########################
#     Rules / Animations  #
###########################

frame-opacity = 1;

rules: (
  #################################
  #        Focus / dimming        #
  #################################
  { match = "focused"; dim = 0;    },
  { match = "!focused"; dim = 0.05; },

  #################################
  #      Focus helper windows     #
  #################################
  { match = "wmwin || override_redirect"; focus = true; },
  { match = "bounding_shaped"; shadow = false; },

  #################################
  #        Window type rules      #
  #################################
  { match = "window_type = 'normal'";   fade = true;  shadow = true; },
  { match = "window_type = 'dialog'";                 shadow = true; },
  { match = "window_type = 'tooltip'"; fade = true;   corner-radius = 0; opacity = 0.85; },
  { match = "fullscreen";              corner-radius = 0; },
  { match = "window_type = 'dock'";    corner-radius = 10; fade = true; },

  {
    match = "window_type = 'dropdown_menu'  || "
            "window_type = 'menu'          || "
            "window_type = 'popup'         || "
            "window_type = 'popup_menu'";
    corner-radius = 0;
  },
#################################
  #         Class-based corners   #
  #################################
  {
    match = "class_g = 'Polybar'        || "
            "class_g = 'eww-bar'        || "
            "class_g = 'Viewnior'       || "
            "class_g = 'Rofi'           || "
            "class_g = 'mpv'            || "
            "class_g = 'bspwm-scratch'  || "
            "class_g = 'retroarch'";
    corner-radius = 0;
  },

  #################################
  #          No shadow            #
  #################################
  {
    match = "class_g = 'Conky'                         || "
            "class_g = 'Cairo-clock'                   || "
            "class_g = 'Polybar'                       || "
            "class_g = 'Eww'                           || "
            "class_g = 'jgmenu'                        || "
            "class_g = 'bspwm-scratch'                 || "
            "class_g = 'Spotify'                       || "
            "class_g = 'retroarch'                     || "
            "class_g = 'Rofi'                          || "
            "class_g = 'Screenkey'                     || "
            "class_g = 'mpv'                           || "
            "class_g = 'Viewnior'                      || "
            "class_g = 'Code' && window_type = 'dropdown_menu' || "
            "class_g = 'Code' && window_type = 'popup_menu'    || "
            "class_g = 'Code' && window_type = 'menu'          || "
            "window_type = 'dropdown_menu'             || "
            "window_type = 'popup_menu'                || "
            "window_type = 'tooltip'                   || "
            "window_type = 'menu'                      || "
            "window_type = 'utility'                   || "
            "window_type = '_GTK_FRAME_EXTENTS@'";
    shadow = false;
  },

  #################################
  #         No focus windows      #
  #################################
  {
    match = "class_g = 'Cairo-clock' || "
            "window_type = 'dock'";
    focus = false;
  },

  {
    match = "window_type = 'dropdown_menu'             || "
            "window_type = 'popup_menu'                || "
            "window_type = 'tooltip'                   || "
            "window_type = 'menu'                      || "
            "class_g = 'Code' && window_type = 'dropdown_menu' || "
            "class_g = 'Code' && window_type = 'popup_menu'    || "
            "class_g = 'Code' && window_type = 'menu'";
    focus = false;
  },

  {
    match = "class_g = 'xborders' || name = 'xborders'",
    blur-background = false;
    fade = false;
    shadow = false;
    corner-radius = 0;
    opacity = 1.0;
    dim = 0;
  },
  {
    match = "class_g = 'Dunst' || "
            "class_g ~= 'Notify-osd' || "
            "name = 'Notification'";
    dim = 0;        # đừng làm tối thêm
    blur-strength = 10;
  },

  @include "picom-animations.conf"
)
